<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Realtime Chat Starter</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111827;
      color: #e5e7eb;
    }
    .app {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 240px;
      background: #020617;
      border-right: 1px solid #1f2937;
      padding: 1rem;
      box-sizing: border-box;
    }
    .sidebar h2 {
      font-size: 0.9rem;
      text-transform: uppercase;
      color: #9ca3af;
      margin-top: 0;
    }
    .sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem 0;
    }
    .sidebar li {
      padding: 0.4rem 0.6rem;
      border-radius: 0.25rem;
      cursor: pointer;
    }
    .sidebar li.active,
    .sidebar li:hover {
      background: #1f2937;
    }
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #1f2937;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #6b7280;
    }
    .status-dot.online {
      background: #22c55e;
    }
    .messages {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
    }
    .message {
      margin-bottom: 0.5rem;
    }
    .message .meta {
      font-size: 0.75rem;
      color: #9ca3af;
    }
    .message .content {
      font-size: 0.9rem;
    }
    .message.system .content {
      color: #f97316;
    }
    .chat-input {
      padding: 0.5rem;
      border-top: 1px solid #1f2937;
      display: flex;
      gap: 0.25rem;
    }
    .chat-input input[type="text"],
    #message-input {
      flex: 1;
      padding: 0.4rem 0.6rem;
      border-radius: 0.25rem;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
    }
    .chat-input button {
      border: none;
      border-radius: 0.25rem;
      padding: 0.4rem 0.6rem;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    .chat-input button:hover {
      background: #1d4ed8;
    }
    img.chat-image {
      max-width: 200px;
      border-radius: 4px;
      display: block;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h2>Rooms</h2>
      <ul id="rooms">
        <li data-room="general" class="active">#general</li>
        <li data-room="voice">#voice</li>
      </ul>

      <h2>Users</h2>
      <ul id="users"></ul>
    </aside>

    <main class="chat">
      <header class="chat-header">
        <span id="room-name">#general</span>
        <span id="status-dot" class="status-dot"></span>
      </header>

      <section id="messages" class="messages"></section>

      <footer class="chat-input">
        <input id="message-input" placeholder="Type a message..." autocomplete="off" />
        <button id="emoji-btn">😀</button>
        <input type="file" id="file-input" hidden />
        <button id="file-btn">📁</button>
        <button id="send-btn">Send</button>
        <button id="voice-btn">🎙</button>
      </footer>
    </main>
  </div>

  <!-- Socket.IO client -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    // Adjust URL if your backend is on another origin
    const socket = io();          // assumes same origin
    const rtcSocket = io('/webrtc');

    let currentRoom = 'general';
    let username = 'User-' + Math.floor(Math.random() * 9999);

    // DOM
    const roomsEl = document.getElementById('rooms');
    const usersEl = document.getElementById('users');
    const messagesEl = document.getElementById('messages');
    const roomNameEl = document.getElementById('room-name');
    const statusDotEl = document.getElementById('status-dot');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const emojiBtn = document.getElementById('emoji-btn');
    const fileBtn = document.getElementById('file-btn');
    const fileInput = document.getElementById('file-input');
    const voiceBtn = document.getElementById('voice-btn');

    // join initial room
    socket.emit('join', { room: currentRoom, username });

    // presence heartbeat
    setInterval(() => {
      socket.emit('heartbeat');
    }, 15000);

    // room switching
    roomsEl.addEventListener('click', e => {
      const li = e.target.closest('li[data-room]');
      if (!li) return;
      const room = li.dataset.room;
      if (room === currentRoom) return;

      document
        .querySelectorAll('#rooms li')
        .forEach(el => el.classList.remove('active'));
      li.classList.add('active');

      currentRoom = room;
      roomNameEl.textContent = '#' + room;
      messagesEl.innerHTML = '';

      socket.emit('join', { room: currentRoom, username });
    });

    // incoming history
    socket.on('history', msgs => {
      messagesEl.innerHTML = '';
      msgs.forEach(addMessage);
      scrollToBottom();
    });

    // incoming messages
    socket.on('message', msg => {
      addMessage(msg);
      scrollToBottom();
    });

    // presence
    socket.on('presence', users => {
      usersEl.innerHTML = '';
      users.forEach(u => {
        const li = document.createElement('li');
        li.textContent = u.username;
        usersEl.appendChild(li);
      });
      statusDotEl.classList.add('online');
    });

    // send text
    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      socket.emit('message', text);
      inputEl.value = '';
    }

    // emoji
    emojiBtn.addEventListener('click', () => {
      const emoji = prompt('Emoji to send (e.g. 😀🔥❤️):');
      if (!emoji) return;
      socket.emit('emoji', emoji);
    });

    // file / image (demo: just object URL, no backend storage)
    fileBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const kind = file.type.startsWith('image/') ? 'image' : 'file';
      socket.emit('file-meta', { name: file.name, url, kind });
      fileInput.value = '';
    });

    // render message
    function addMessage(msg) {
      const div = document.createElement('div');
      div.className = 'message ' + (msg.type === 'system' ? 'system' : '');
      const meta = document.createElement('div');
      meta.className = 'meta';
      const time = new Date(msg.created_at).toLocaleTimeString();
      meta.textContent = `${msg.username} • ${time}`;

      const content = document.createElement('div');
      content.className = 'content';

      if (msg.type === 'image') {
        const data = JSON.parse(msg.content);
        const img = document.createElement('img');
        img.src = data.url;
        img.alt = data.name;
        img.className = 'chat-image';
        content.appendChild(img);
      } else if (msg.type === 'file') {
        const data = JSON.parse(msg.content);
        const a = document.createElement('a');
        a.href = data.url;
        a.textContent = `📁 ${data.name}`;
        a.target = '_blank';
        content.appendChild(a);
      } else {
        content.textContent = msg.content;
      }

      div.appendChild(meta);
      div.appendChild(content);
      messagesEl.appendChild(div);
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    /* --- WebRTC voice (minimal signaling skeleton) --- */

    let localStream = null;
    let peers = {};

    voiceBtn.addEventListener('click', async () => {
      try {
        if (!localStream) {
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        }
        rtcSocket.emit('join-voice', { room: currentRoom, userId: username });
      } catch (e) {
        console.error('Mic error', e);
        alert('Could not access microphone');
      }
    });

    rtcSocket.on('user-joined', async ({ userId, socketId }) => {
      const pc = createPeer(socketId, true);
      peers[socketId] = pc;
      if (localStream) {
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      }
    });

    rtcSocket.on('signal', async ({ from, data }) => {
      let pc = peers[from];
      if (!pc) {
        pc = createPeer(from, false);
        peers[from] = pc;
        if (localStream) {
          localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        }
      }
      if (data.sdp) {
        await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
        if (data.sdp.type === 'offer') {
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          rtcSocket.emit('signal', {
            room: currentRoom,
            to: from,
            data: { sdp: pc.localDescription }
          });
        }
      } else if (data.candidate) {
        try {
          await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        } catch (e) {
          console.error(e);
        }
      }
    });

    function createPeer(remoteSocketId, isInitiator) {
      const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });

      pc.onicecandidate = e => {
        if (e.candidate) {
          rtcSocket.emit('signal', {
            room: currentRoom,
            to: remoteSocketId,
            data: { candidate: e.candidate }
          });
        }
      };

      pc.ontrack = e => {
        const audio = document.createElement('audio');
        audio.srcObject = e.streams[0];
        audio.autoplay = true;
        document.body.appendChild(audio);
      };

      if (isInitiator) {
        pc.onnegotiationneeded = async () => {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          rtcSocket.emit('signal', {
            room: currentRoom,
            to: remoteSocketId,
            data: { sdp: pc.localDescription }
          });
        };
      }

      return pc;
    }
  </script>
</body>
</html>
