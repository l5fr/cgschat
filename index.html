<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Global Chat I am NOT responcible for your actions </title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   NEXUS — black & purple global chat
   Deploys to Vercel. Powered by Supabase.
═══════════════════════════════════════════ */
:root{
  --bg:#050508;
  --bg2:#0a0a12;
  --bg3:#0f0f1a;
  --bg4:#141420;
  --purple:#7c3aed;
  --purple2:#9d5bf7;
  --purple3:#5b21b6;
  --purple4:#3b0d99;
  --glow:rgba(124,58,237,.45);
  --dim:rgba(124,58,237,.13);
  --accent:#c084fc;
  --accent2:#e879f9;
  --text:#f0eeff;
  --text2:#a89fc7;
  --text3:#5f5680;
  --border:rgba(124,58,237,.2);
  --border2:rgba(124,58,237,.07);
  --green:#22c55e;
  --red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--purple4);border-radius:2px;}

/* grid + glow backdrop */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.035) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(ellipse at 50% 0%,black 30%,transparent 80%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(124,58,237,.18) 0%,transparent 55%);pointer-events:none;z-index:0;}

/* ── SHARED LAYER ── */
.layer{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;}

/* ── LOADING ── */
#loading{background:var(--bg);}
.load-inner{display:flex;flex-direction:column;align-items:center;gap:20px;}
.load-mark{width:76px;height:76px;border-radius:22px;background:linear-gradient(135deg,var(--purple),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:34px;animation:markPulse 2.4s ease-in-out infinite;box-shadow:0 0 0 0 var(--glow);}
@keyframes markPulse{0%,100%{box-shadow:0 0 30px var(--glow)}50%{box-shadow:0 0 70px var(--glow),0 0 140px rgba(124,58,237,.15)}}
.load-ring{width:38px;height:38px;border-radius:50%;border:2.5px solid var(--dim);border-top-color:var(--purple);animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--text3);}

@keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(.95)}to{opacity:1;transform:none}}

/* ── AUTH SCREEN ── */
#auth{background:rgba(5,5,8,.97);display:none;}
.auth-card{position:relative;z-index:2;background:linear-gradient(160deg,rgba(14,14,26,.98),rgba(8,8,16,.99));border:1px solid var(--border);border-radius:26px;padding:46px 42px;width:420px;max-width:93vw;box-shadow:0 0 100px rgba(124,58,237,.16);animation:slideUp .5s cubic-bezier(.34,1.56,.64,1) both;}
.logo{text-align:center;margin-bottom:30px;}
.logo-ic{width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,var(--purple),var(--accent2));display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:14px;animation:markPulse 3s ease-in-out infinite;}
.logo h1{font-size:29px;font-weight:800;letter-spacing:8px;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo small{display:block;font-size:10px;color:var(--text3);letter-spacing:3px;margin-top:3px;font-family:'JetBrains Mono',monospace;}
.tabs{display:flex;background:var(--bg2);border-radius:11px;padding:4px;gap:4px;margin-bottom:24px;}
.tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:1px;}
.tab.on{background:var(--dim);color:var(--accent);border:1px solid var(--border);}
.pnl{display:none;}.pnl.on{display:block;}
.f{margin-bottom:13px;}
.f label{display:block;font-size:10px;letter-spacing:2.5px;color:var(--text3);margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
.f input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:all .2s;}
.f input:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--dim);}
.f input::placeholder{color:var(--text3);}
.avrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;}
.avo{width:38px;height:38px;border-radius:10px;background:var(--bg2);border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;transition:all .18s;user-select:none;}
.avo:hover{border-color:var(--purple2);transform:scale(1.08);}
.avo.on{border-color:var(--accent);box-shadow:0 0 10px var(--glow);}
.btn-main{width:100%;background:linear-gradient(135deg,var(--purple),var(--purple2));border:none;border-radius:11px;padding:14px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-top:18px;transition:all .2s;box-shadow:0 4px 20px rgba(124,58,237,.4);}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,.6);}
.btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.aerr{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:9px;padding:10px 14px;font-size:12px;color:#fca5a5;margin-top:10px;display:none;font-family:'JetBrains Mono',monospace;line-height:1.5;}
.aerr.on{display:block;}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh;position:relative;z-index:1;}
#app.on{display:flex;}

/* topbar */
.tbar{height:54px;background:rgba(8,8,16,.94);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 20px;gap:14px;backdrop-filter:blur(24px);flex-shrink:0;z-index:50;}
.tbar-logo{font-size:16px;font-weight:800;letter-spacing:6px;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.pill{display:flex;align-items:center;gap:7px;border-radius:20px;padding:3px 12px;font-size:11px;font-family:'JetBrains Mono',monospace;transition:all .3s;}
.pill.live{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#4ade80;}
.pill.wait{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);color:#fde047;}
.pdot{width:7px;height:7px;border-radius:50%;}
.pill.live .pdot{background:var(--green);animation:liveDot 2s ease-in-out infinite;}
.pill.wait .pdot{background:var(--yellow,#eab308);}
@keyframes liveDot{0%,100%{opacity:1;box-shadow:0 0 6px rgba(34,197,94,.8)}50%{opacity:.35;box-shadow:none}}
.tbar-gap{flex:1;}
.tbar-user{display:flex;align-items:center;gap:9px;cursor:pointer;position:relative;user-select:none;}
.tbar-av{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid var(--purple);background:var(--bg3);}
.tbar-name{font-size:13px;font-weight:600;color:var(--text2);}
.drop{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:7px;min-width:175px;box-shadow:0 8px 32px rgba(0,0,0,.6);display:none;z-index:200;animation:slideUp .18s ease both;}
.drop.on{display:block;}
.ditem{padding:9px 12px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px;}
.ditem:hover{background:var(--dim);color:var(--text);}
.ditem.red:hover{background:rgba(239,68,68,.1);color:var(--red);}
.dsep{height:1px;background:var(--border2);margin:4px 0;}

/* chat */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-head{padding:13px 24px 11px;border-bottom:1px solid var(--border2);background:rgba(8,8,16,.6);backdrop-filter:blur(14px);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.chat-ic{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--purple3),var(--purple));display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 16px rgba(124,58,237,.3);}
.chat-nm{font-size:15px;font-weight:700;}
.chat-sub{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:2px;}

/* message groups */
.mg{display:flex;flex-direction:column;margin-bottom:16px;}
.mg.me{align-items:flex-end;}
.mg.them{align-items:flex-start;}
.mmeta{display:flex;align-items:center;gap:8px;margin-bottom:5px;padding:0 2px;}
.mg.me .mmeta{flex-direction:row-reverse;}
.mav{width:26px;height:26px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.mname{font-size:12px;font-weight:600;color:var(--text2);}
.mtime{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.bub{max-width:520px;padding:10px 15px;border-radius:15px;font-size:14px;line-height:1.65;word-break:break-word;animation:bIn .2s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes bIn{from{opacity:0;transform:translateY(6px) scale(.96)}to{opacity:1;transform:none}}
.mg.me   .bub{background:linear-gradient(135deg,var(--purple),var(--purple3));color:#fff;border-bottom-right-radius:3px;box-shadow:0 3px 14px rgba(124,58,237,.28);}
.mg.them .bub{background:var(--bg3);color:var(--text);border-bottom-left-radius:3px;border:1px solid var(--border2);}
.mimg{max-width:280px;border-radius:13px;overflow:hidden;cursor:pointer;transition:transform .2s;animation:bIn .2s cubic-bezier(.34,1.56,.64,1) both;}
.mimg:hover{transform:scale(1.02);}
.mimg img{width:100%;display:block;}
.mfile{display:flex;align-items:center;gap:11px;background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:12px 14px;cursor:pointer;max-width:280px;transition:border-color .2s;animation:bIn .2s cubic-bezier(.34,1.56,.64,1) both;}
.mfile:hover{border-color:var(--purple2);}
.fic{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--purple3),var(--purple));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.fnm{font-size:13px;font-weight:600;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fsz{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.sys{text-align:center;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:5px 0;display:flex;align-items:center;gap:10px;margin:4px 0;}
.sys::before,.sys::after{content:'';flex:1;height:1px;background:var(--border2);}

/* typing */
.tybar{padding:0 24px 8px;min-height:26px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.tydots{display:flex;gap:3px;}
.tydots span{width:5px;height:5px;border-radius:50%;background:var(--purple2);animation:td 1.4s ease-in-out infinite;}
.tydots span:nth-child(2){animation-delay:.2s;}.tydots span:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1}}

/* input */
.iarea{padding:13px 20px 17px;background:rgba(8,8,16,.84);border-top:1px solid var(--border2);backdrop-filter:blur(18px);flex-shrink:0;}
.itb{display:flex;gap:5px;margin-bottom:8px;}
.tbb{height:26px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text3);font-size:11px;padding:0 10px;cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.tbb:hover{color:var(--accent);border-color:var(--border);background:var(--dim);}
.irow{display:flex;gap:9px;align-items:flex-end;}
.iwrap{position:relative;flex:1;}
.mta{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;resize:none;min-height:44px;max-height:120px;transition:border-color .2s,box-shadow .2s;line-height:1.55;}
.mta:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--dim);}
.mta::placeholder{color:var(--text3);}
.sbtn{width:44px;height:44px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--purple),var(--purple2));border:none;color:#fff;font-size:17px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(124,58,237,.4);}
.sbtn:hover{transform:scale(1.07);box-shadow:0 6px 22px rgba(124,58,237,.6);}
.sbtn:active{transform:scale(.96);}
.embox{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:9px;display:flex;flex-wrap:wrap;gap:3px;width:228px;box-shadow:0 -8px 26px rgba(0,0,0,.45);z-index:80;animation:slideUp .15s ease both;}
.em{width:29px;height:29px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border-radius:7px;transition:background .12s;user-select:none;}
.em:hover{background:var(--dim);}

/* modals */
.mov{position:fixed;inset:0;background:rgba(3,3,8,.86);backdrop-filter:blur(10px);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.mov.on{opacity:1;pointer-events:all;}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:30px;width:370px;max-width:90vw;box-shadow:0 0 50px rgba(124,58,237,.2);transform:scale(.95);transition:transform .22s cubic-bezier(.34,1.56,.64,1);}
.mov.on .modal{transform:scale(1);}
.modal h3{font-size:17px;font-weight:800;margin-bottom:3px;}
.modal p{font-size:11px;color:var(--text3);margin-bottom:20px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;}
.mf{margin-bottom:12px;}
.mf label{display:block;font-size:10px;letter-spacing:2.5px;color:var(--text3);margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
.mf input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:all .2s;}
.mf input:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--dim);}
.mbtns{display:flex;gap:9px;margin-top:18px;}
.bcnl{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:11px;color:var(--text2);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.bcnl:hover{background:var(--bg3);}
.bok{flex:1;background:linear-gradient(135deg,var(--purple),var(--purple2));border:none;border-radius:9px;padding:11px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(124,58,237,.4);}
.bok:hover{box-shadow:0 6px 20px rgba(124,58,237,.6);transform:translateY(-1px);}

/* lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:800;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
.lb.on{display:flex;}
.lb img{max-width:90vw;max-height:90vh;border-radius:12px;}

/* toasts */
.tw{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:900;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 17px;font-size:12px;display:flex;align-items:center;gap:9px;animation:bIn .25s cubic-bezier(.34,1.56,.64,1) both;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;}

a{color:var(--accent);}
.mention{color:var(--accent);font-weight:600;}
input[type=file]{display:none;}
@media(max-width:600px){.auth-card{padding:30px 20px;}.setup-box{padding:30px 20px;}.msgs{padding:12px;}.iarea{padding:10px 12px 14px;}}
</style>
</head>
<body>
<input type="file" id="imgIn" accept="image/*">
<input type="file" id="fileIn">

<!-- ── LOADING ── -->
<div class="layer" id="loading">
  <div class="load-inner">
    <div class="load-mark">⚡</div>
    <div class="load-ring"></div>
    <div class="load-label" id="loadLbl">CONNECTING...</div>
  </div>
</div>

<!-- ── AUTH ── -->
<div class="layer" id="auth">
  <div class="auth-card">
    <div class="logo">
      <div class="logo-ic">⚡</div>
      <h1>NEXUS  I am NOT responcible for your actions </h1>
      <small>GLOBAL CHAT I am NOT responcible for your actions </small>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="setTab('l')">Sign In</button>
      <button class="tab" onclick="setTab('r')">Create Account</button>
    </div>

    <!-- login -->
    <div class="pnl on" id="pL">
      <div class="f"><label>EMAIL</label><input type="email" id="lE" placeholder="you@example.com" autocomplete="email"></div>
      <div class="f"><label>PASSWORD</label><input type="password" id="lP" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="aerr" id="lErr"></div>
      <button class="btn-main" id="lBtn" onclick="doLogin()">SIGN IN →</button>
    </div>

    <!-- register -->
    <div class="pnl" id="pR">
      <div class="f"><label>DISPLAY NAME</label><input type="text" id="rN" placeholder="Your name" maxlength="24" autocomplete="nickname"></div>
      <div class="f">
        <label>AVATAR</label>
        <div class="avrow" id="regAv">
          <div class="avo on" data-e="🦊">🦊</div><div class="avo" data-e="🐺">🐺</div><div class="avo" data-e="🦁">🦁</div><div class="avo" data-e="🐉">🐉</div><div class="avo" data-e="👾">👾</div><div class="avo" data-e="🤖">🤖</div><div class="avo" data-e="👻">👻</div><div class="avo" data-e="🌟">🌟</div><div class="avo" data-e="🎭">🎭</div><div class="avo" data-e="🔮">🔮</div>
        </div>
      </div>
      <div class="f"><label>EMAIL</label><input type="email" id="rE" placeholder="you@example.com" autocomplete="email"></div>
      <div class="f"><label>PASSWORD</label><input type="password" id="rP" placeholder="Min 6 characters" autocomplete="new-password"></div>
      <div class="aerr" id="rErr"></div>
      <button class="btn-main" id="rBtn" onclick="doReg()">CREATE ACCOUNT →</button>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="tbar">
    <div class="tbar-logo">NEXUS</div>
    <div class="pill wait" id="pill"><div class="pdot"></div><span id="pillTxt">Connecting</span></div>
    <div class="tbar-gap"></div>
    <div class="tbar-user" id="tbarUser" onclick="togDrop()">
      <div class="tbar-av" id="tbarAv">🦊</div>
      <div class="tbar-name" id="tbarName">User</div>
      <span style="color:var(--text3);font-size:11px;margin-left:2px;">▾</span>
      <div class="drop" id="drop">
        <div class="ditem" onclick="openProf()">✏️ Edit Profile</div>
        <div class="dsep"></div>
        <div class="ditem red" onclick="doLogout()">🚪 Sign Out</div>
      </div>
    </div>
  </div>

  <div class="chat">
    <div class="chat-head">
      <div class="chat-ic">🌐</div>
      <div>
        <div class="chat-nm">Global Chat</div>
        <div class="chat-sub" id="chatSub">—</div>
      </div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="tybar" id="tybar"></div>
    <div class="iarea">
      <div class="itb">
        <div class="tbb" onclick="document.getElementById('imgIn').click()">🖼️ Image</div>
        <div class="tbb" onclick="document.getElementById('fileIn').click()">📎 File</div>
        <div class="tbb" onclick="togEm()" id="emBtn">😊 Emoji</div>
      </div>
      <div class="irow">
        <div class="iwrap">
          <div class="embox" id="embox" style="display:none;"></div>
          <textarea class="mta" id="mta" placeholder="Message everyone on NEXUS..." rows="1" onkeydown="onKey(event)" oninput="onTaIn()"></textarea>
        </div>
        <button class="sbtn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->

<!-- ════════════════════════════════════════════
     SUPABASE JS (loaded from CDN — no npm needed)
════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ══════════════════════════════════════════════════
   NEXUS — Supabase-powered global chat
   Single HTML file. Deploys to Vercel as-is.
   Messages sync in real time across every device.
══════════════════════════════════════════════════ */

// ── CONFIG ──
const SB_URL = 'https://yystxsggxvnkjxrvqnnd.supabase.co';
const SB_KEY = 'sb_publishable_OuppEyMVGpfqFAuTIuX_EA_kojCNZ39';
let sb = null;   // supabase client
let me = null;   // { id, name, avatar, email }
let realtimeCh = null;
let typTimer = null, isTyp = false;
let typUsers = {};
let emOpen = false, editAv = '🦊', regAv = '🦊';
let msgCache = [];
let onlineCount = 0;

const EMOJIS = ['😀','😂','😍','🥰','😎','🤩','😊','🙌','👏','🔥','💯','❤️','💜','⚡','🎉','✨','🌟','💫','🦊','🐺','🦁','🤣','😭','😤','🥺','🤔','👀','💀','🤝','👋','🙏','💪','🚀','💎','🎮','🌙','🦋','🎭','⚔️','🔮'];

// ── INIT ─────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildEmojis();
  setupAvPickers();
  bindKeys();
  initSupabase();
});

function initSupabase() {
  sb = supabase.createClient(SB_URL, SB_KEY);
  setLoadLbl('CHECKING SESSION...');

  // Check existing session
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      loadProfile(session.user).then(() => bootApp());
    } else {
      hide('loading'); show('auth');
    }
  }).catch(() => {
    hide('loading');
    toast('Could not connect to Supabase — check your internet connection','error');
  });

  // Listen for auth changes
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') {
      me = null; msgCache = [];
      hide('app'); show('auth');
      if (realtimeCh) { sb.removeChannel(realtimeCh); realtimeCh = null; }
    }
  });
}

async function loadProfile(user) {
  try {
    const { data } = await sb.from('profiles').select('name, avatar').eq('id', user.id).single();
    me = {
      id:     user.id,
      email:  user.email,
      name:   (data && data.name)  || user.email.split('@')[0],
      avatar: (data && data.avatar) || '🦊'
    };
  } catch(e) {
    // Profile table may not exist yet — still let them in with defaults
    me = { id: user.id, email: user.email, name: user.email.split('@')[0], avatar: '🦊' };
  }
}

// ── AUTH ──────────────────────────────────────────
window.setTab = t => {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('on',(t==='l'?0:1)===i));
  document.getElementById('pL').classList.toggle('on', t==='l');
  document.getElementById('pR').classList.toggle('on', t==='r');
}

window.doLogin = async function() {
  const email=document.getElementById('lE').value.trim();
  const pass=document.getElementById('lP').value;
  const btn=document.getElementById('lBtn'), err=document.getElementById('lErr');
  hideE(err);
  if(!email||!pass){showE(err,'Enter your email and password');return;}
  btn.disabled=true; btn.textContent='Signing in...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(error){ showE(err, friendlyErr(error.message)); btn.disabled=false; btn.textContent='SIGN IN →'; return; }
  await loadProfile(data.user);
  bootApp();
}

window.doReg = async function() {
  const name=document.getElementById('rN').value.trim();
  const email=document.getElementById('rE').value.trim();
  const pass=document.getElementById('rP').value;
  const btn=document.getElementById('rBtn'), err=document.getElementById('rErr');
  hideE(err);
  if(!name){showE(err,'Enter a display name');return;}
  if(!email){showE(err,'Enter your email');return;}
  if(pass.length<6){showE(err,'Password must be 6+ characters');return;}
  btn.disabled=true; btn.textContent='Creating...';

  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if(error){ showE(err,friendlyErr(error.message)); btn.disabled=false; btn.textContent='CREATE ACCOUNT →'; return; }

  // Email confirmation may be enabled — handle gracefully
  if(!data.session){
    showE(err,'Account created! Sign in with your email and password.');
    btn.disabled=false; btn.textContent='CREATE ACCOUNT →';
    setTab('l'); document.getElementById('lE').value=email;
    return;
  }

  await sb.from('profiles').upsert({ id: data.user.id, name: name.trim().slice(0,24), avatar: regAv, updated_at: new Date().toISOString() });
  me = { id: data.user.id, email, name: name.trim().slice(0,24), avatar: regAv };
  bootApp();
}

window.doLogout = async function() {
  document.getElementById('drop').classList.remove('on');
  if(realtimeCh){ sb.removeChannel(realtimeCh); realtimeCh=null; }
  await sb.auth.signOut();
  // Reset buttons
  document.getElementById('lBtn').disabled=false; document.getElementById('lBtn').textContent='SIGN IN →';
  document.getElementById('rBtn').disabled=false; document.getElementById('rBtn').textContent='CREATE ACCOUNT →';
}

function friendlyErr(msg='') {
  if(msg.includes('Invalid login'))   return 'Incorrect email or password';
  if(msg.includes('already registered')||msg.includes('already exists')) return 'Email already registered';
  if(msg.includes('Password'))        return 'Password must be 6+ characters';
  if(msg.includes('valid email'))     return 'Enter a valid email address';
  if(msg.includes('Email not confirmed')) return 'Check your email and confirm your account first';
  return msg || 'Something went wrong';
}

// ── BOOT APP ──────────────────────────────────────
function bootApp() {
  try {
    hide('loading'); hide('auth'); hide('setup');
    document.getElementById('app').classList.add('on');
    updTopbar();
    loadHistory();
    subscribeRealtime();
  } catch(e) {
    console.error('bootApp error:', e);
    toast('App error: ' + e.message, 'error');
  }
}

function updTopbar() {
  document.getElementById('tbarAv').textContent   = me.avatar;
  document.getElementById('tbarName').textContent = me.name;
}

// ── HISTORY ───────────────────────────────────────
async function loadHistory() {
  try {
    const { data, error } = await sb.from('messages')
      .select('*').order('created_at', { ascending: true }).limit(150);
    if(error){
      if(error.code === '42P01' || error.message.includes('does not exist')){
        document.getElementById('msgs').innerHTML = '<div class="sys">⚠️ Database tables not set up yet — run the SQL in Supabase SQL Editor first</div>';
      } else {
        toast('Could not load messages: ' + error.message, 'error');
      }
      return;
    }
    msgCache = (data||[]).map(dbToMsg);
    renderAll();
    scrollBot();
    setPill('live', onlineCount + ' online');
  } catch(e) {
    toast('Load error: ' + e.message, 'error');
  }
}

function dbToMsg(r) {
  return {
    id:       r.id,
    uid:      r.user_id,
    name:     r.name,
    avatar:   r.avatar || '🦊',
    type:     r.type || 'text',
    content:  r.content || '',
    fileName: r.file_name,
    fileSize: r.file_size,
    ts:       new Date(r.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false}),
    time:     new Date(r.created_at).getTime()
  };
}

// ── REALTIME ──────────────────────────────────────
function subscribeRealtime() {
  if(realtimeCh) { sb.removeChannel(realtimeCh); }

  realtimeCh = sb.channel('global-chat')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, payload => {
      const msg = dbToMsg(payload.new);
      // Deduplicate (we may have already added optimistically)
      if(msgCache.find(m=>m.id===msg.id)) return;
      msgCache.push(msg);
      appendMsg(msg);
      if(isNearBot()) scrollBot();
    })
    .on('broadcast', { event:'typing' }, ({ payload }) => {
      if(payload.uid === me.id) return;
      clearTimeout(typUsers[payload.uid]?.t);
      if(payload.state==='start') {
        typUsers[payload.uid] = { name: payload.name, t: setTimeout(()=>{ delete typUsers[payload.uid]; renderTy(); },4000) };
      } else { delete typUsers[payload.uid]; }
      renderTy();
    })
    .on('presence', { event:'sync' }, () => {
      const state = realtimeCh.presenceState();
      onlineCount = Object.keys(state).length;
      setPill('live', `${onlineCount} online`);
      document.getElementById('chatSub').textContent = `${onlineCount} user${onlineCount!==1?'s':''} online`;
    })
    .on('presence', { event:'join' }, ({ newPresences }) => {
      newPresences.forEach(p => { if(p.uid!==me.id) toast(`${p.avatar} ${p.name} joined`,'info'); });
    })
    .subscribe(async status => {
      if(status==='SUBSCRIBED') {
        await realtimeCh.track({ uid: me.id, name: me.name, avatar: me.avatar });
        setPill('live', `${onlineCount} online`);
      }
    });
}

function subscribePresence() {} // handled inside subscribeRealtime

// ── SEND ──────────────────────────────────────────
window.sendMsg = async function() {
  const ta=document.getElementById('mta');
  const txt=ta.value.trim(); if(!txt) return;
  ta.value=''; ta.style.height='auto'; stopTyp();

  // Optimistic: show immediately
  const tempId = 'tmp_'+Date.now();
  const opt = { id:tempId, uid:me.id, name:me.name, avatar:me.avatar, type:'text', content:txt, ts:nowTs(), time:Date.now() };
  msgCache.push(opt); appendMsg(opt); scrollBot();

  const { data, error } = await sb.from('messages').insert({
    user_id: me.id, name: me.name, avatar: me.avatar,
    type: 'text', content: txt
  }).select().single();

  if(error) { toast('Failed to send','error'); msgCache = msgCache.filter(m=>m.id!==tempId); renderAll(); return; }
  // Replace temp with real
  const idx = msgCache.findIndex(m=>m.id===tempId);
  if(idx>=0) msgCache[idx] = dbToMsg(data);
}

async function sendMedia(type, content, fileName, fileSize) {
  const tempId = 'tmp_'+Date.now();
  const opt = { id:tempId, uid:me.id, name:me.name, avatar:me.avatar, type, content, fileName, fileSize, ts:nowTs(), time:Date.now() };
  msgCache.push(opt); appendMsg(opt); scrollBot();

  const row = { user_id:me.id, name:me.name, avatar:me.avatar, type, content };
  if(fileName) { row.file_name=fileName; row.file_size=fileSize; }

  const { data, error } = await sb.from('messages').insert(row).select().single();
  if(error) { toast('Failed to send','error'); msgCache=msgCache.filter(m=>m.id!==tempId); renderAll(); return; }
  const idx=msgCache.findIndex(m=>m.id===tempId); if(idx>=0) msgCache[idx]=dbToMsg(data);
}

// ── TYPING ────────────────────────────────────────
window.onTaIn = function() {
  const ta=document.getElementById('mta'); ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px';
  if(!realtimeCh) return;
  if(!isTyp){ isTyp=true; realtimeCh.send({type:'broadcast',event:'typing',payload:{uid:me.id,name:me.name,state:'start'}}); }
  clearTimeout(typTimer); typTimer=setTimeout(stopTyp,3500);
}
function stopTyp(){ if(isTyp){isTyp=false; if(realtimeCh) realtimeCh.send({type:'broadcast',event:'typing',payload:{uid:me.id,name:me.name,state:'stop'}});} clearTimeout(typTimer); }
window.onKey = e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }

function renderTy(){
  const bar=document.getElementById('tybar'); const names=Object.values(typUsers).map(u=>u.name);
  if(!names.length){bar.innerHTML='';return;}
  bar.innerHTML=`<div class="tydots"><span></span><span></span><span></span></div><span>${x(names.join(', '))} ${names.length===1?'is':'are'} typing...</span>`;
}

// ── FILES ─────────────────────────────────────────
document.getElementById('imgIn').addEventListener('change', function(){
  const f=this.files[0]; if(!f) return;
  if(f.size>2097152){toast('Max 2MB for images','error');this.value='';return;}
  const r=new FileReader(); r.onload=async e=>{ await sendMedia('image',e.target.result); toast('Image sent 🖼️','success'); };
  r.readAsDataURL(f); this.value='';
});
document.getElementById('fileIn').addEventListener('change', function(){
  const f=this.files[0]; if(!f) return;
  if(f.size>4194304){toast('Max 4MB','error');this.value='';return;}
  const r=new FileReader(); r.onload=async e=>{ await sendMedia('file',e.target.result,f.name,fmt(f.size)); toast('File shared 📎','success'); };
  r.readAsDataURL(f); this.value='';
});

// ── RENDER ────────────────────────────────────────
function renderAll(){
  const el=document.getElementById('msgs'); el.innerHTML='';
  if(!msgCache.length){el.innerHTML='<div class="sys">Be the first to say hello 👋</div>';return;}
  grp(msgCache).forEach(g=>renderGrp(g,el));
}

function appendMsg(m){
  const el=document.getElementById('msgs');
  const ph=el.querySelector('.sys');if(ph)ph.remove();
  if(m.type==='system'){const d=document.createElement('div');d.className='sys';d.textContent=m.content;el.appendChild(d);return;}
  const last=el.querySelector('.mg:last-child');
  if(last&&last.dataset.uid===m.uid&&m.time-parseInt(last.dataset.t||0)<90000){
    renderBub(m,last);last.dataset.t=m.time;
  } else { grp([m]).forEach(g=>renderGrp(g,el)); }
}

function grp(msgs){
  const out=[];let cur=null;
  msgs.forEach(m=>{
    if(m.type==='system'){if(cur){out.push(cur);cur=null;}out.push({sys:true,content:m.content});return;}
    if(!cur||cur.uid!==m.uid||m.time-cur.lt>90000){if(cur)out.push(cur);cur={uid:m.uid,name:m.name,avatar:m.avatar,msgs:[m],lt:m.time};}
    else{cur.msgs.push(m);cur.lt=m.time;}
  });
  if(cur)out.push(cur);return out;
}

function renderGrp(g,container){
  if(g.sys){const d=document.createElement('div');d.className='sys';d.textContent=g.content;container.appendChild(d);return;}
  const mine=g.uid===me.id;
  const grpEl=document.createElement('div');grpEl.className=`mg ${mine?'me':'them'}`;grpEl.dataset.uid=g.uid;grpEl.dataset.t=g.lt;
  const hdr=document.createElement('div');hdr.className='mmeta';
  hdr.innerHTML=`<div class="mav">${g.avatar}</div><span class="mname">${x(mine?'You':g.name)}</span><span class="mtime">${g.msgs[0].ts}</span>`;
  grpEl.appendChild(hdr);
  g.msgs.forEach(m=>renderBub(m,grpEl));
  container.appendChild(grpEl);
}

function renderBub(m,grp){
  if(m.type==='text'){const b=document.createElement('div');b.className='bub';b.innerHTML=linkify(x(m.content));grp.appendChild(b);}
  else if(m.type==='image'){const w=document.createElement('div');w.className='mimg';const img=document.createElement('img');img.src=m.content;img.loading='lazy';img.onclick=()=>openLb(m.content);w.appendChild(img);grp.appendChild(w);}
  else if(m.type==='file'){const f=document.createElement('div');f.className='mfile';f.innerHTML=`<div class="fic">📄</div><div><div class="fnm">${x(m.fileName||'')}</div><div class="fsz">${m.fileSize||''}</div></div>`;f.onclick=()=>{const a=document.createElement('a');a.href=m.content;a.download=m.fileName;a.click();};grp.appendChild(f);}
}

// ── PROFILE ───────────────────────────────────────
window.openProf=()=>{document.getElementById('profN').value=me.name;editAv=me.avatar;document.querySelectorAll('#editAv .avo').forEach(el=>el.classList.toggle('on',el.dataset.e===me.avatar));document.getElementById('profMov').classList.add('on');document.getElementById('drop').classList.remove('on');}
window.closeProf=()=>document.getElementById('profMov').classList.remove('on');
window.saveProf=async function(){
  const name=document.getElementById('profN').value.trim();if(!name){toast('Enter a name','error');return;}
  me.name=name;me.avatar=editAv;
  await sb.from('profiles').upsert({id:me.id,name,avatar:editAv,updated_at:new Date().toISOString()});
  // Re-track presence with new info
  if(realtimeCh) await realtimeCh.track({uid:me.id,name,avatar:editAv});
  updTopbar();closeProf();toast('Profile updated ✨','success');
}
window.togDrop=()=>document.getElementById('drop').classList.toggle('on');

// ── EMOJI ─────────────────────────────────────────
function buildEmojis(){const b=document.getElementById('embox');b.innerHTML='';EMOJIS.forEach(em=>{const d=document.createElement('div');d.className='em';d.textContent=em;d.addEventListener('mousedown',e=>{e.preventDefault();const ta=document.getElementById('mta');const p=ta.selectionStart;ta.value=ta.value.slice(0,p)+em+ta.value.slice(p);ta.selectionStart=ta.selectionEnd=p+em.length;ta.focus();togEm();});b.appendChild(d);});}
window.togEm=()=>{emOpen=!emOpen;document.getElementById('embox').style.display=emOpen?'flex':'none';}

// ── AVATAR PICKERS ────────────────────────────────
function setupAvPickers(){
  document.querySelectorAll('#regAv .avo').forEach(el=>el.addEventListener('click',()=>{document.querySelectorAll('#regAv .avo').forEach(e=>e.classList.remove('on'));el.classList.add('on');regAv=el.dataset.e;}));
  document.querySelectorAll('#editAv .avo').forEach(el=>el.addEventListener('click',()=>{document.querySelectorAll('#editAv .avo').forEach(e=>e.classList.remove('on'));el.classList.add('on');editAv=el.dataset.e;}));
}

function bindKeys(){
  document.getElementById('lE').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lP').focus();});
  document.getElementById('lP').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('rP').addEventListener('keydown',e=>{if(e.key==='Enter')doReg();});
}

// ── LIGHTBOX ──────────────────────────────────────
window.openLb=s=>{document.getElementById('lbImg').src=s;document.getElementById('lb').classList.add('on');}
window.closeLb=()=>document.getElementById('lb').classList.remove('on');

// ── TOAST ─────────────────────────────────────────
window.toast=function(msg,type='info'){
  const w=document.getElementById('tw');const el=document.createElement('div');el.className='toast';
  el.style.borderColor=type==='success'?'rgba(34,197,94,.4)':type==='error'?'rgba(239,68,68,.4)':'var(--border)';
  el.innerHTML=`<span>${type==='success'?'✅':type==='error'?'❌':'💜'}</span><span>${msg}</span>`;
  w.appendChild(el);setTimeout(()=>{el.style.transition='all .3s';el.style.opacity='0';el.style.transform='translateY(12px)';setTimeout(()=>el.remove(),300);},3000);
}

// ── UTILS ─────────────────────────────────────────
function setPill(state,txt){
  const p=document.getElementById('pill');p.className='pill '+state;document.getElementById('pillTxt').textContent=txt;
}
function isNearBot(){const c=document.getElementById('msgs');return c.scrollHeight-c.scrollTop-c.clientHeight<120;}
function scrollBot(){const c=document.getElementById('msgs');requestAnimationFrame(()=>c.scrollTop=c.scrollHeight);}
function x(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function linkify(t){return t.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>').replace(/@(\w+)/g,'<span class="mention">@$1</span>');}
function fmt(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function showE(el,msg){el.textContent=msg;el.classList.add('on');}
function hideE(el){el.classList.remove('on');}
function nowTs(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function hide(id){const el=document.getElementById(id);if(!el)return;el.style.display='none';el.classList&&el.classList.remove('on');}
function show(id){const el=document.getElementById(id);el.style.display='flex';el.classList&&el.classList.add('on');}
function setLoadLbl(t){document.getElementById('loadLbl').textContent=t;}

document.addEventListener('click',e=>{
  if(emOpen&&!e.target.closest('.iwrap')&&!e.target.closest('#emBtn')){emOpen=false;document.getElementById('embox').style.display='none';}
  if(!e.target.closest('.tbar-user')) document.getElementById('drop').classList.remove('on');
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeLb();closeProf();document.getElementById('drop').classList.remove('on');}
});
</script>
