<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>T9 OS Chat</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{height:100vh;display:flex;background:linear-gradient(135deg,#0a0e27 0%,#1a1f3a 100%);color:#e8eaf6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;overflow:hidden}

  .sidebar{width:280px;background:rgba(15,20,40,0.95);backdrop-filter:blur(10px);border-right:1px solid rgba(100,150,255,0.1);padding:20px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex-shrink:0}
  .sidebar::-webkit-scrollbar{width:6px}
  .sidebar::-webkit-scrollbar-track{background:transparent}
  .sidebar::-webkit-scrollbar-thumb{background:rgba(100,150,255,0.3);border-radius:3px}
  .section-title{color:#6b9fff;font-size:.7rem;margin-top:12px;margin-bottom:4px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
  .sidebar-item{padding:12px 14px;background:rgba(30,40,70,0.6);border-radius:10px;cursor:pointer;transition:all 0.2s ease;border:1px solid transparent;font-size:.95rem}
  .sidebar-item:hover{background:rgba(50,70,120,0.7);border-color:rgba(100,150,255,0.2);transform:translateX(2px)}
  .sidebar-item.active{background:linear-gradient(135deg,#4e8cff 0%,#3a6fd9 100%);border-color:rgba(100,150,255,0.3);box-shadow:0 2px 8px rgba(78,140,255,0.3)}

  .chat-area{flex:1;display:flex;flex-direction:column;background:rgba(10,15,30,0.5);min-width:0;position:relative}
  .chat-header{padding:18px 24px;background:rgba(15,25,50,0.8);backdrop-filter:blur(10px);border-bottom:1px solid rgba(100,150,255,0.15);font-size:1.15rem;color:#a8c5ff;font-weight:600;letter-spacing:0.3px;flex-shrink:0}
  .messages{flex:1;overflow:auto;padding:24px;display:flex;flex-direction:column;gap:14px}
  .messages::-webkit-scrollbar{width:8px}
  .messages::-webkit-scrollbar-track{background:transparent}
  .messages::-webkit-scrollbar-thumb{background:rgba(100,150,255,0.3);border-radius:4px}
  .msg{max-width:65%;animation:slideIn 0.2s ease}
  @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .msg.own{align-self:flex-end}
  .msg-name{font-size:.75rem;color:#7ea8ff;margin-bottom:5px;font-weight:500;display:flex;align-items:center;gap:6px}
  .msg-name.owner{background:linear-gradient(135deg,#FFD700 0%,#FFA500 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700;text-shadow:0 0 20px rgba(255,215,0,0.5)}
  .owner-badge{display:inline-block;background:linear-gradient(135deg,#FFD700 0%,#FFA500 100%);color:#1a1f3a;padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:700;letter-spacing:0.5px;box-shadow:0 2px 8px rgba(255,215,0,0.4);text-shadow:none;-webkit-text-fill-color:initial}
  .msg-bubble{background:rgba(30,45,80,0.9);padding:12px 16px;border-radius:12px;color:#e8eaf6;box-shadow:0 2px 6px rgba(0,0,0,0.2);border:1px solid rgba(100,150,255,0.1);line-height:1.5}
  .msg.own .msg-bubble{background:linear-gradient(135deg,#4e8cff 0%,#5a98ff 100%);color:#fff;border-color:rgba(255,255,255,0.1)}
  .msg.owner-msg .msg-bubble{background:linear-gradient(135deg,#FFD700 0%,#FFA500 100%);color:#1a1f3a;border-color:rgba(255,215,0,0.3);box-shadow:0 4px 12px rgba(255,215,0,0.3);font-weight:500}

  .input-bar{display:flex;gap:12px;padding:16px 24px;background:rgba(15,25,50,0.9);backdrop-filter:blur(10px);border-top:1px solid rgba(100,150,255,0.15);flex-shrink:0;align-items:center}
  .input-bar input{flex:1 1 auto;min-width:0;padding:14px 18px;border-radius:24px;background:rgba(30,40,70,0.8);border:1px solid rgba(100,150,255,0.2);color:#e8eaf6;font-size:.95rem;transition:all 0.2s ease}
  .input-bar input:focus{outline:none;border-color:rgba(100,150,255,0.5);background:rgba(30,40,70,1)}
  .input-bar input::placeholder{color:rgba(200,210,255,0.4)}
  .char-counter{font-size:.75rem;color:rgba(200,210,255,0.5);pointer-events:none;white-space:nowrap;flex-shrink:0}
  .char-counter.warning{color:rgba(255,200,100,0.9);font-weight:600}
  .char-counter.error{color:rgba(255,100,100,0.9);font-weight:600}
  .input-bar button{flex-shrink:0;width:100px;padding:14px;border-radius:24px;border:none;background:linear-gradient(135deg,#4e8cff 0%,#3a6fd9 100%);font-weight:600;color:#fff;cursor:pointer;transition:all 0.2s ease}
  .input-bar button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(78,140,255,0.4)}
  .input-bar button:active{transform:translateY(0)}
  .input-bar button:disabled{background:rgba(70,80,120,0.5);cursor:not-allowed;transform:none;box-shadow:none}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn 0.3s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:linear-gradient(135deg,rgba(15,25,50,0.98) 0%,rgba(20,30,60,0.98) 100%);border:1px solid rgba(100,150,255,0.3);border-radius:16px;padding:32px;min-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:modalSlide 0.3s ease}
  @keyframes modalSlide{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
  .modal h2{color:#a8c5ff;margin-bottom:20px;text-align:center;font-size:1.4rem;font-weight:600}
  .modal input{width:100%;padding:14px 16px;border-radius:10px;border:1px solid rgba(100,150,255,0.3);background:rgba(30,40,70,0.8);color:#e8eaf6;margin-bottom:18px;font-size:.95rem;transition:all 0.2s ease}
  .modal input:focus{outline:none;border-color:rgba(100,150,255,0.6);background:rgba(30,40,70,1)}
  .modal input::placeholder{color:rgba(200,210,255,0.4)}
  .modal button{width:100%;padding:14px;background:linear-gradient(135deg,#4e8cff 0%,#3a6fd9 100%);border:none;border-radius:10px;color:#fff;font-weight:600;cursor:pointer;font-size:1rem;transition:all 0.2s ease;box-shadow:0 4px 12px rgba(78,140,255,0.3)}
  .modal button:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(78,140,255,0.4)}
  .modal button:active{transform:translateY(0)}
  .modal-error{color:#ff6b6b;font-size:.85rem;margin-top:-10px;margin-bottom:14px;text-align:center;display:none}

  .warning-toast{position:fixed;top:20px;right:20px;background:rgba(255,50,50,0.95);color:white;padding:16px 24px;border-radius:12px;box-shadow:0 4px 12px rgba(255,50,50,0.4);animation:slideInRight 0.3s ease;z-index:2000;font-weight:600}
  @keyframes slideInRight{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<div id="nameModal" class="modal-overlay">
  <div class="modal">
    <h2>Welcome to T9 OS Chat</h2>
    <input id="nameInput" placeholder="Enter your display name" maxlength="32" autocomplete="off" />
    <div id="modalError" class="modal-error"></div>
    <button id="nameSubmit">Join Chat</button>
  </div>
</div>

<div class="sidebar">
  <div class="section-title">Rooms</div>
  <div id="publicRoomBtn" class="sidebar-item active">🌍 Public</div>
  <div id="createRoomBtn" class="sidebar-item">➕ Create Room</div>
  <div id="joinRoomBtn" class="sidebar-item">🔗 Join Room</div>
  <div id="joinedRooms" class="sidebar-rooms" style="display:flex;flex-direction:column;gap:6px;margin-top:10px;"></div>
</div>

<div class="chat-area">
  <div class="chat-header" id="roomTitle">Public Chat</div>
  <div id="messages" class="messages">
    <div style="text-align:center;color:#7ea8ff;opacity:0.7">Welcome to Public Chat</div>

  <div class="input-bar">
    <input id="msgInput" placeholder="Type a message…" autocomplete="off" maxlength="300" />
    <span id="charCounter" class="char-counter">0/300</span>
    <button id="sendBtn">Send</button>

</div>

<script>
const OWNER_IDS_BAN = ["6528690208","3222695271","0376780508","0635354315","3293484597"];
const ID_KEY        = "numericUserID";

const banFirebaseConfig = {
  apiKey: "AIzaSyCTUq6Hye-l6Lh2ylHQ4yOM-HUWODGgMtY",
  authDomain: "chatty-boi-c876e.firebaseapp.com",
  databaseURL: "https://chatty-boi-c876e-default-rtdb.firebaseio.com",
  projectId: "chatty-boi-c876e",
  storageBucket: "chatty-boi-c876e.firebasestorage.app",
  messagingSenderId: "1073159135051",
  appId: "1:1073159135051:web:8c991df26ea3c1eb84d2ce",
  measurementId: "G-03QWMK5ZNM"
};
const banApp = firebase.initializeApp(banFirebaseConfig);
const banDB  = firebase.database(banApp);

function generateNumericID() {
  const ts  = Date.now().toString().slice(-6);
  const rnd = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
  return rnd + ts;
}

(function () {
  'use strict';
  const origSet  = Storage.prototype.setItem;
  let   isLocked = false;
  let   myID     = null;

  function lockScreen() {
    if (isLocked) return;
    isLocked = true;
    document.body.innerHTML = '';
    document.body.style.cssText =
      'background:red;color:white;display:flex;justify-content:center;align-items:center;font-size:40px;overflow:hidden;margin:0;height:100vh;';
    document.body.innerText = 'BANNED';
    const block = e => { e.preventDefault(); e.stopPropagation(); return false; };
    ['keydown','keyup','keypress','mousedown','mouseup','click',
     'touchstart','touchend','contextmenu','beforeunload'].forEach(ev => {
      document.addEventListener(ev, block, true);
      window.addEventListener(ev, block, true);
    });
    Storage.prototype.setItem    = () => {};
    Storage.prototype.removeItem = () => {};
    Storage.prototype.clear      = () => {};
    Object.freeze(localStorage);
    Object.freeze(sessionStorage);
    window.onbeforeunload = () => true;
    history.pushState(null, null, location.href);
    window.onpopstate = () => history.go(1);
    window.banDB  = null;
    window.firebase = null;
  }

  document.addEventListener('DOMContentLoaded', () => {
    myID = localStorage.getItem(ID_KEY);
    if (!myID) { myID = generateNumericID(); origSet.call(localStorage, ID_KEY, myID); }

    window.currentUserID = myID;
    window.banDatabase   = banDB;
    window.isOwnerBan    = OWNER_IDS_BAN.includes(myID);

    setInterval(() => {
      if (localStorage.getItem(ID_KEY) !== myID) origSet.call(localStorage, ID_KEY, myID);
      if (isLocked) lockScreen();
    }, 100);

    const bannedRef = banDB.ref('bannedIDs');
    bannedRef.on('value', snap => {
      const list = snap.val() || [];
      if (list.includes(myID)) lockScreen();
    });

    document.addEventListener('keydown', async e => {
      if (!OWNER_IDS_BAN.includes(myID) || e.key !== ',') return;
      const action   = prompt("Type 'ban' or 'unban':");
      if (!action) return;
      const targetID = prompt('Enter the ID to ' + action + ':');
      if (!targetID) return;
      const snap  = await bannedRef.get();
      let   list  = snap.val() || [];
      if (action.toLowerCase() === 'ban') {
        if (!list.includes(targetID)) { list.push(targetID); await bannedRef.set(list); alert('Banned: ' + targetID); }
        else alert('Already banned.');
      } else if (action.toLowerCase() === 'unban') {
        list = list.filter(id => id !== targetID);
        await bannedRef.set(list);
        alert('Unbanned: ' + targetID);
      } else alert('Invalid action.');
    });
  });
})();
</script>

<!-- ══ Chat logic (Supabase) ══ -->
<script>
/* ─── Supabase setup ─── */
const SB_URL = 'https://yystxsggxvnkjxrvqnnd.supabase.co';
const SB_KEY = 'sb_publishable_OuppEyMVGpfqFAuTIuX_EA_kojCNZ39';
const sb     = supabase.createClient(SB_URL, SB_KEY);

/* ─── Owner IDs (for VIP badge) ─── */
const OWNER_IDS = [
  "6528690208","4084803237","0376780508","0635354315",
  "0071913330","3293484597","9023752876","2409657080",
  "0752582881","3546738543"
];

/* ─── Constants ─── */
const MAX_CHARS    = 300;
const MAX_MESSAGES = 100;
const MSG_COOLDOWN = 5000;

/* ─── State ─── */
let myID          = null;
let sbUUID        = null;
let username      = 'Anonymous';
let currentRoom   = 'public';
let realtimeSub   = null;
let violationCount = 0;
let lastMsgTime   = 0;
let joinedRooms   = new Set(['public']);

/* ─── DOM ─── */
const messagesEl    = document.getElementById('messages');
const msgInput      = document.getElementById('msgInput');
const sendBtn       = document.getElementById('sendBtn');
const charCounter   = document.getElementById('charCounter');
const roomTitle     = document.getElementById('roomTitle');
const nameModal     = document.getElementById('nameModal');
const nameInput     = document.getElementById('nameInput');
const nameSubmit    = document.getElementById('nameSubmit');
const modalError    = document.getElementById('modalError');
const publicRoomBtn = document.getElementById('publicRoomBtn');
const createRoomBtn = document.getElementById('createRoomBtn');
const joinRoomBtn   = document.getElementById('joinRoomBtn');
const joinedRoomsEl = document.getElementById('joinedRooms');

/* ─── Profanity filter ─── */
const profanityPatterns = [
  /n+[i1!|]+[gq9]+[e3a@]+r+/gi,
  /n+[i1!|]+[gq9]+[ae@3]+/gi,
  /n[i1!|]+b+[b8]+[ae@3]+/gi,
  /\bf+[\s.\-_]*u+[\s.\-_]*c+[\s.\-_]*k+\b/gi,
  /\bf+[\s.\-_]*[u@]+[\s.\-_]*[c(<]+[\s.\-_]*[k|!]+\b/gi,
  /\bph+u+c+k+\b/gi,
  /\bs+[\s.\-_]*h+[\s.\-_]*[i1!]+[\s.\-_]*t+\b/gi,
  /\bb+[\s.\-_]*[i1!]+[\s.\-_]*t+[\s.\-_]*c+[\s.\-_]*h+\b/gi,
  /\bd+[\s.\-_]*a+[\s.\-_]*m+[\s.\-_]*n+\b/gi,
  /\bc+[\s.\-_]*r+[\s.\-_]*a+[\s.\-_]*p+\b/gi,
  /\bp+[\s.\-_]*i+[\s.\-_]*s+[\s.\-_]*s+\b/gi,
  /\bf+[\s.\-_]*a+[\s.\-_]*g+\b/gi,
  /\bf+[\s.\-_]*[a@4]+[\s.\-_]*[gq9]+[o0]*[t+]*\b/gi,
  /ch+[i1!]+n+k+/gi,
  /sp+[i1!]+c+/gi,
  /w+[e3]+t+b+[a@]+c+k+/gi,
];

function normalizeText(text) {
  return text.toLowerCase()
    .replace(/[\s.\-_]/g,'').replace(/0/g,'o').replace(/1/g,'i').replace(/3/g,'e')
    .replace(/4/g,'a').replace(/5/g,'s').replace(/7/g,'t').replace(/8/g,'b')
    .replace(/9/g,'g').replace(/@/g,'a').replace(/[!|]/g,'i').replace(/\$/g,'s').replace(/\+/g,'t');
}

function containsProfanity(text) {
  for (const p of profanityPatterns) { p.lastIndex = 0; if (p.test(text)) return true; }
  const n = normalizeText(text);
  return ['fuck','shit','bitch','damn','crap','piss','nigger','nigga',
          'fag','faggot','chink','spic','wetback','niger','niga','nibba'].some(w => n.includes(w));
}

/* ─── Helpers ─── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showWarning(msg) {
  const t = document.createElement('div');
  t.className   = 'warning-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'slideInRight 0.3s ease reverse';
    setTimeout(() => t.remove(), 300);
  }, 3000);
}

async function handleViolation() {
  violationCount++;
  const MAX = 3;
  if (violationCount >= MAX) {
    showWarning(`You have been banned for ${MAX} chat filter violations.`);
    const bannedRef = window.banDatabase.ref('bannedIDs');
    const snap      = await bannedRef.get();
    let   list      = snap.val() || [];
    if (!list.includes(myID)) { list.push(myID); await bannedRef.set(list); }
    setTimeout(() => location.reload(), 2000);
  } else {
    showWarning(`Warning ${violationCount}/3: Inappropriate language. ${3 - violationCount} warning(s) left.`);
  }
}

function isOwner(id) { return OWNER_IDS.includes(id); }

/* ─── Render a message row ─── */
function appendMessage(row) {
  if (!row) return;

  const numericId  = row.avatar || row.user_id;
  const mine       = numericId === myID || row.user_id === sbUUID;
  const ownerFlag  = isOwner(numericId);

  const div       = document.createElement('div');
  div.className   = 'msg' + (mine ? ' own' : '') + (ownerFlag ? ' owner-msg' : '');

  const displayName = `${esc(row.name || 'Anon')} (${esc(numericId)})`;
  const badge       = ownerFlag ? '<span class="owner-badge">V.I.P</span>' : '';
  const nameClass   = ownerFlag ? 'msg-name owner' : 'msg-name';

  div.innerHTML = `<div class="${nameClass}">${displayName} ${badge}</div>
                   <div class="msg-bubble">${esc(row.content)}</div>`;
  messagesEl.appendChild(div);

  while (messagesEl.children.length > MAX_MESSAGES) messagesEl.children[0].remove();

  if (messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 150)
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

/* ─── Load history ─── */
async function loadHistory(room) {
  messagesEl.innerHTML = '';
  const { data, error } = await sb
    .from('messages')
    .select('user_id, name, avatar, content, created_at')
    .eq('file_name', room)
    .eq('deleted', false)
    .order('created_at', { ascending: true })
    .limit(100);

  if (error) { console.error('[history]', error); return; }
  (data || []).forEach(appendMessage);
}

/* ─── Real-time subscription ─── */
function subscribeRoom(room) {
  if (realtimeSub) { sb.removeChannel(realtimeSub); realtimeSub = null; }

  realtimeSub = sb.channel('t9-room-' + room)
    .on('postgres_changes', {
      event:  'INSERT',
      schema: 'public',
      table:  'messages',
      filter: `file_name=eq.${room}`
    }, ({ new: row }) => {
      if (!row.deleted) appendMessage(row);
    })
    .subscribe();
}

/* ─── Switch rooms ─── */
function switchRoom(room) {
  currentRoom = room;
  roomTitle.textContent = room === 'public' ? 'Public Chat' : room;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  if (room === 'public') publicRoomBtn.classList.add('active');
  else Array.from(joinedRoomsEl.children).forEach(el => {
    if (el.textContent === room) el.classList.add('active');
  });
  loadHistory(room);
  subscribeRoom(room);
}

function refreshJoinedRoomsUI() {
  joinedRoomsEl.innerHTML = '';
  joinedRooms.forEach(room => {
    if (room === 'public') return;
    const div       = document.createElement('div');
    div.className   = 'sidebar-item';
    div.textContent = room;
    div.addEventListener('click', () => switchRoom(room));
    joinedRoomsEl.appendChild(div);
  });
}

/* ─── Send message ─── */
async function sendMessage() {
  const txt = msgInput.value.trim();
  if (!txt) return;

  const now      = Date.now();
  const timeLeft = MSG_COOLDOWN - (now - lastMsgTime);
  if (timeLeft > 0) {
    showWarning(`Please wait ${Math.ceil(timeLeft / 1000)}s before sending again.`);
    return;
  }
  if (txt.length > MAX_CHARS) { showWarning(`Max ${MAX_CHARS} characters.`); return; }
  if (containsProfanity(txt)) {
    msgInput.value = '';
    updateCharCounter();
    await handleViolation();
    return;
  }

  sendBtn.disabled = true;

  // Attempt 1: insert with current sbUUID (real auth user)
  let payload = {
    user_id:   sbUUID,
    name:      username,
    avatar:    myID,
    type:      'text',
    content:   txt,
    file_name: currentRoom,
    deleted:   false
  };

  let { error } = await sb.from('messages').insert(payload);

  // Attempt 2: if FK/RLS error, try to re-authenticate then retry
  if (error) {
    console.warn('[send attempt 1 failed]', error.code, error.message);

    // Re-try getting a valid auth session
    sbUUID = await getSupabaseUUID();
    payload.user_id = sbUUID;
    const res2 = await sb.from('messages').insert(payload);
    error = res2.error;

    // Attempt 3: insert without user_id (if column is nullable)
    if (error) {
      console.warn('[send attempt 2 failed]', error.code, error.message);
      const { user_id: _drop, ...payloadNoUID } = payload;
      const res3 = await sb.from('messages').insert(payloadNoUID);
      error = res3.error;
    }
  }

  if (error) {
    console.error('[send all attempts failed]', error.code, error.message, error.details, error.hint);
    showWarning(`Send failed: ${error.message || 'Unknown error'}`);
    sendBtn.disabled = false;
    return;
  }

  msgInput.value = '';
  updateCharCounter();
  lastMsgTime = now;
  setTimeout(() => { sendBtn.disabled = false; }, MSG_COOLDOWN);
}

/* ─── Char counter ─── */
function updateCharCounter() {
  const len = msgInput.value.length;
  charCounter.textContent = `${len}/${MAX_CHARS}`;
  charCounter.classList.remove('warning', 'error');
  if (len > MAX_CHARS * 0.9) charCounter.classList.add('error');
  else if (len > MAX_CHARS * 0.75) charCounter.classList.add('warning');
}
msgInput.addEventListener('input', updateCharCounter);

/* ─── Send events ─── */
sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

/* ─── Room buttons ─── */
publicRoomBtn.addEventListener('click', () => switchRoom('public'));

createRoomBtn.addEventListener('click', () => {
  const room = prompt('Enter new room name:')?.trim();
  if (!room) return;
  if (containsProfanity(room)) { alert('Room name contains inappropriate language.'); return; }
  joinedRooms.add(room);
  refreshJoinedRoomsUI();
  switchRoom(room);
});

joinRoomBtn.addEventListener('click', () => {
  const room = prompt('Enter room name to join:')?.trim();
  if (!room) return;
  joinedRooms.add(room);
  refreshJoinedRoomsUI();
  switchRoom(room);
});

/* ─── Auth helper: try anonymous sign-in, fall back gracefully ─── */
async function getSupabaseUUID() {
  // 1. Try existing session first (avoids unnecessary new sign-ins)
  try {
    const { data: sessionData } = await sb.auth.getSession();
    if (sessionData?.session?.user?.id) return sessionData.session.user.id;
  } catch (_) {}

  // 2. Try anonymous sign-in (requires Anonymous provider enabled in Supabase dashboard)
  try {
    const { data, error } = await sb.auth.signInAnonymously();
    if (!error && data?.user?.id) return data.user.id;
    console.warn('[auth] signInAnonymously failed:', error?.message);
  } catch (err) {
    console.warn('[auth] signInAnonymously threw:', err);
  }

  // 3. Final fallback: use a stable UUID stored in localStorage
  const fallbackKey = 'sbFallbackUUID';
  let stored = localStorage.getItem(fallbackKey);
  if (!stored) {
    stored = crypto.randomUUID();
    localStorage.setItem(fallbackKey, stored);
  }
  console.info('[auth] Using localStorage fallback UUID:', stored);
  return stored;
}

/* ─── Name modal ─── */
async function handleNameSubmit(e) {
  if (e) e.preventDefault();
  const name = nameInput.value.trim();
  if (!name) { showModalError('Please enter a display name.'); return; }
  if (containsProfanity(name)) { showModalError('Display name contains inappropriate language.'); return; }
  username = name.slice(0, 32);

  myID = window.currentUserID || localStorage.getItem(ID_KEY) || ('guest_' + Date.now());

  nameSubmit.disabled    = true;
  nameSubmit.textContent = 'Connecting…';
  modalError.style.display = 'none';

  sbUUID = await getSupabaseUUID();

  nameModal.remove();
  switchRoom('public');
}

function showModalError(msg) {
  modalError.textContent  = msg;
  modalError.style.display = 'block';
}

nameSubmit.addEventListener('click', handleNameSubmit);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleNameSubmit(e); });
setTimeout(() => nameInput.focus(), 100);
