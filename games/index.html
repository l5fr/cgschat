<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Games</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000008;
    --t1: #f0eeff;
    --t2: #a89fc7;
    --t3: #5f5680;
    --border: rgba(255,255,255,0.12);
    --border-hover: rgba(255,255,255,0.3);
    --p: #7c3aed;
    --ac: #c084fc;
  }
  html, body { height: 100%; background: var(--bg); color: var(--t1); font-family: 'Space Grotesk', sans-serif; overflow: hidden; }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('../appsbg.jpg');
    background-size: cover; background-position: center;
    filter: brightness(0.7) saturate(1.2);
  }
  .bg::after {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px),
      radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(0,0,8,0.65) 100%);
  }

  /* ── LOAD SCREEN ── */
  #loadScreen {
    position: fixed; inset: 0; z-index: 99999;
    background: #000008;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.7s ease, visibility 0.7s;
  }
  #loadScreen.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
  #loadScreen::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(60,0,120,0.2) 0%, transparent 70%); animation: glowPulse 3s ease-in-out infinite; }
  @keyframes glowPulse { 0%,100%{opacity:.5;} 50%{opacity:1;} }
  .ls-corner { position: absolute; width: 36px; height: 36px; opacity: .25; }
  .ls-corner.tl { top: 22px; left: 22px; border-top: 1px solid #a78bfa; border-left: 1px solid #a78bfa; }
  .ls-corner.tr { top: 22px; right: 22px; border-top: 1px solid #a78bfa; border-right: 1px solid #a78bfa; }
  .ls-corner.bl { bottom: 22px; left: 22px; border-bottom: 1px solid #a78bfa; border-left: 1px solid #a78bfa; }
  .ls-corner.br { bottom: 22px; right: 22px; border-bottom: 1px solid #a78bfa; border-right: 1px solid #a78bfa; }
  .ls-logo { font-size: clamp(52px,10vw,90px); font-weight: 700; letter-spacing: 18px; text-transform: uppercase; color: #fff; text-shadow: 0 0 40px rgba(120,80,255,0.8), 0 0 80px rgba(60,0,200,0.4); position: relative; z-index: 1; opacity: 0; transform: translateY(18px) scale(.96); animation: lsLogoIn .9s cubic-bezier(.22,1,.36,1) .3s forwards; }
  @keyframes lsLogoIn { to { opacity:1; transform:none; } }
  .ls-sub { font-family: 'Fira Code', monospace; font-size: 11px; letter-spacing: 5px; color: #a78bfa; margin-top: 16px; position: relative; z-index: 1; opacity: 0; animation: fadeUp .7s ease .9s forwards; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }
  .ls-sub .dot { display: inline-block; animation: dotBlink 1.4s ease-in-out infinite; }
  .ls-sub .dot:nth-child(2) { animation-delay: .2s; }
  .ls-sub .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes dotBlink { 0%,80%,100%{opacity:0;} 40%{opacity:1;} }
  .ls-bar { position: absolute; bottom: 0; left: 0; height: 2px; width: 0; background: linear-gradient(90deg, #5b21b6, #a78bfa, #60a5fa); box-shadow: 0 0 12px rgba(167,139,250,.7); animation: lsBar 2.4s cubic-bezier(.4,0,.2,1) .2s forwards; z-index: 1; }
  @keyframes lsBar { 0%{width:0;} 60%{width:72%;} 85%{width:91%;} 100%{width:100%;} }

  /* ── PAGE ── */
  #page {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transform: translateY(12px); pointer-events: none;
    transition: opacity .7s ease .1s, transform .7s ease .1s;
  }
  #page.visible { opacity: 1; transform: none; pointer-events: all; }

  /* ── BACK BUTTON ── */
  .back-btn {
    position: fixed; top: 20px; left: 20px; z-index: 20;
    display: flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(10,5,25,0.7);
    color: rgba(255,255,255,0.6);
    font-family: 'Fira Code', monospace;
    font-size: 11px; letter-spacing: 1px;
    text-decoration: none;
    backdrop-filter: blur(10px);
    transition: all .2s;
  }
  .back-btn:hover { border-color: rgba(255,255,255,0.28); color: #fff; background: rgba(20,10,45,0.8); text-decoration: none; }

  .logo { font-size: clamp(40px,7vw,72px); font-weight: 700; letter-spacing: 14px; text-transform: uppercase; color: #fff; text-shadow: 0 0 30px rgba(120,80,255,0.7), 0 0 60px rgba(60,0,200,0.35); margin-bottom: 8px; animation: logoGlow 4s ease-in-out infinite; }
  @keyframes logoGlow { 0%,100%{text-shadow:0 0 30px rgba(120,80,255,0.7),0 0 60px rgba(60,0,200,0.35);} 50%{text-shadow:0 0 50px rgba(140,100,255,1),0 0 100px rgba(80,20,220,0.5);} }

  .page-tag {
    font-family: 'Fira Code', monospace; font-size: 10px; letter-spacing: 5px;
    color: rgba(167,139,250,0.6); margin-bottom: 52px; text-transform: uppercase;
  }

  /* ── COMING SOON BOX ── */
  .soon-box {
    background: rgba(10,5,25,0.72);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 52px 64px;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    backdrop-filter: blur(12px);
    position: relative; overflow: hidden;
    min-width: 320px; text-align: center;
  }
  /* corner accents */
  .soon-box::before, .soon-box::after {
    content: ''; position: absolute; width: 18px; height: 18px; opacity: .4;
  }
  .soon-box::before { top: 8px; left: 8px; border-top: 1.5px solid #a78bfa; border-left: 1.5px solid #a78bfa; }
  .soon-box::after { bottom: 8px; right: 8px; border-bottom: 1.5px solid #a78bfa; border-right: 1.5px solid #a78bfa; }

  .soon-icon { font-size: 56px; filter: drop-shadow(0 0 16px rgba(167,139,250,0.5)); animation: iconFloat 3s ease-in-out infinite; }
  @keyframes iconFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  .soon-title { font-size: 22px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; color: #fff; }
  .soon-sub { font-family: 'Fira Code', monospace; font-size: 11px; letter-spacing: 3px; color: rgba(167,139,250,0.6); line-height: 1.8; }

  /* blinking cursor */
  .cursor { display: inline-block; width: 8px; height: 14px; background: rgba(167,139,250,0.7); margin-left: 3px; vertical-align: middle; animation: cursorBlink 1.1s steps(1) infinite; }
  @keyframes cursorBlink { 0%,100%{opacity:1;} 50%{opacity:0;} }

  /* status bar */
  .soon-status {
    display: flex; align-items: center; gap: 8px;
    background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2);
    border-radius: 6px; padding: 7px 14px;
    font-family: 'Fira Code', monospace; font-size: 10px; color: rgba(167,139,250,0.8);
    letter-spacing: 1px; margin-top: 6px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; animation: dotPulse 2s ease-in-out infinite; }
  @keyframes dotPulse { 0%,100%{opacity:0.4;box-shadow:none;} 50%{opacity:1;box-shadow:0 0 8px rgba(167,139,250,0.8);} }

  .footer { margin-top: 40px; font-family: 'Fira Code', monospace; font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.25); text-align: center; }
  .footer span { color: rgba(167,139,250,0.4); }

  @media (max-width: 480px) {
    .soon-box { padding: 36px 28px; min-width: unset; width: 88vw; }
    .soon-title { font-size: 16px; letter-spacing: 4px; }
    .logo { letter-spacing: 8px; }
  }
</style>
</head>
<body>

<div class="bg"></div>

<!-- Load Screen -->
<div id="loadScreen">
  <div class="ls-corner tl"></div>
  <div class="ls-corner tr"></div>
  <div class="ls-corner bl"></div>
  <div class="ls-corner br"></div>
  <div class="ls-logo">NEXUS</div>
  <div class="ls-sub">LOADING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  <div class="ls-bar"></div>
</div>

<!-- Back button -->
<a href="/" class="back-btn">← back to nexus</a>

<!-- Main Page -->
<div id="page">
  <div class="logo">nexus</div>
  <div class="page-tag">// games</div>

  <div class="soon-box">
    <div class="soon-icon">🎮</div>
    <div class="soon-title">Coming Soon</div>
    <div class="soon-sub">
      games are being developed<span class="cursor"></span><br>
      check back later
    </div>
    <div class="soon-status">
      <div class="status-dot"></div>
      STATUS: IN DEVELOPMENT
    </div>
  </div>

  <div class="footer">
    -_&nbsp;<span>✦</span>&nbsp;website created &amp; developed by <span>@jio</span>&nbsp;<span>✦</span>&nbsp;_-
  </div>
</div>

<script>
  setTimeout(() => {
    const ls = document.getElementById('loadScreen');
    ls.classList.add('fade-out');
    setTimeout(() => {
      ls.style.display = 'none';
      document.getElementById('page').classList.add('visible');
    }, 700);
  }, 2500);
</script>
</body>
</html>
