<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Maps</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000008; --t1: #f0eeff; --t3: #5f5680;
    --p: #7c3aed; --p2: #9d5bf7; --ac: #c084fc;
    --border: rgba(255,255,255,0.08); --border-h: rgba(167,139,250,0.4);
    --dim: rgba(124,58,237,0.1);
  }
  html, body { height: 100%; background: var(--bg); color: var(--t1); font-family: 'Space Grotesk', sans-serif; overflow: hidden; }

  .container { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    height: 48px; flex-shrink: 0;
    background: rgba(6,5,17,0.98); border-bottom: 1px solid rgba(124,58,237,0.15);
    display: flex; align-items: center; padding: 0 14px; gap: 10px;
  }
  .topbar-icon { font-size: 18px; }
  .topbar-title { font-size: 13px; font-weight: 700; letter-spacing: 4px; color: var(--t1); }
  .topbar-gap { flex: 1; }

  .search-row {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 14px; background: rgba(6,5,17,0.9);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #searchInput {
    flex: 1; height: 34px; padding: 0 14px;
    background: rgba(10,5,25,0.8); border: 1px solid var(--border);
    border-radius: 8px; color: var(--t1); font-family: 'Fira Code', monospace;
    font-size: 11px; letter-spacing: 1px; outline: none; transition: border-color .18s;
  }
  #searchInput:focus { border-color: var(--border-h); }
  #searchInput::placeholder { color: var(--t3); }
  #searchBtn {
    height: 34px; padding: 0 16px; border-radius: 8px;
    background: linear-gradient(135deg, var(--p), var(--p2));
    border: none; color: #fff; font-family: 'Fira Code', monospace;
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer; transition: all .18s; box-shadow: 0 2px 10px rgba(124,58,237,0.4);
    white-space: nowrap;
  }
  #searchBtn:hover { transform: scale(1.05); box-shadow: 0 4px 18px rgba(124,58,237,0.6); }

  .map-wrap { flex: 1; position: relative; }
  #mapFrame { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="topbar-icon">🗺️</div>
    <div class="topbar-title">NEXUS MAPS</div>
    <div class="topbar-gap"></div>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="search any location..."
      onkeydown="if(event.key==='Enter') searchMap()">
    <button id="searchBtn" onclick="searchMap()">🔍 SEARCH</button>
  </div>

  <div class="map-wrap">
    <iframe id="mapFrame"
      src="https://maps.google.com/maps?q=New+York&output=embed&z=12"
      allowfullscreen
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>
</div>

<script>
  function searchMap() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    const encoded = encodeURIComponent(q);
    document.getElementById('mapFrame').src =
      `https://maps.google.com/maps?q=${encoded}&output=embed&z=13`;
  }
</script>
</body>
</html>
